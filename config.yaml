# ====================================================
# ApexScan Config — US Market Only
# ====================================================

finnhub_key: "YOUR_FINNHUB_FREE_KEY_HERE"         # Get free at finnhub.io
alpha_vantage_key: "YOUR_ALPHA_VANTAGE_KEY_HERE"  # alphavantage.co
twelve_data_key: "YOUR_TWELVE_DATA_KEY_HERE"       # twelvedata.com (800 req/day free)
marketstack_key: "YOUR_MARKETSTACK_KEY_HERE"       # marketstack.com (100 req/month free)

# ---- ALPHA VANTAGE SETTINGS ----
alpha_vantage:
  # Free tier: 25 requests/day, 5 requests/minute
  # Premium tier: higher limits — adjust rate_limit_pause and cache_hours below

  eps_lookback_quarters: 4      # how many quarters of EPS to analyse
  min_eps_growth: 15            # % minimum quarterly EPS growth to flag
  min_surprise_pct: 5           # % minimum earnings beat to score positively

  # KEY SETTING: cache for 7 days so you only burn 3 API calls per ticker
  # on the first scan, then read from cache for the rest of the week
  cache_hours: 168              # 168h = 7 days (FREE TIER MUST USE 168+)

  rate_limit_pause: 13          # seconds between AV calls (free: 5/min max)

  # Smart batching — only fetch AV data for top N tickers by price momentum
  # This keeps you well within 25 calls/day on the free tier
  # Set to 0 to fetch for ALL tickers (premium only)
  max_av_calls_per_scan: 8      # fetch AV for top 8 tickers only (uses 24 calls)

# ---- THRESHOLDS ----
thresholds:
  us:
    min_3m_perf: 15
    min_volume: 1_000_000
    rs_rating_min: 70
    near_52w_high: 0.85
    score_filter: 30

# ---- BENCHMARKS ----
benchmarks:
  us: "^GSPC"   # S&P 500

