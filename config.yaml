# ====================================================
# ApexScan Config — US Market Only
# ====================================================

finnhub_key: "YOUR_FINNHUB_FREE_KEY_HERE"
ngx_pulse_key: "YOUR_NGM_LIVE_KEY_HERE"   # Bearer token from api.ngnmarket.com
alpha_vantage_key: "YOUR_ALPHA_VANTAGE_KEY_HERE"

# ---- ALPHA VANTAGE SETTINGS ----
alpha_vantage:
  eps_lookback_quarters: 4
  min_eps_growth: 15
  min_surprise_pct: 5
  cache_hours: 168
  rate_limit_pause: 13
  max_av_calls_per_scan: 8

# ---- THRESHOLDS ----
thresholds:
  us:
    min_3m_perf: 5
    min_volume: 300000
    rs_rating_min: 50
    near_52w_high: 0.85
    score_filter: 25
  ng:
    min_3m_perf: 3          # NGX moves slower — 3% minimum 3m return
    min_volume: 50000       # NGX has lower daily volumes
    rs_rating_min: 50
    near_52w_high: 0.85
    score_filter: 25

# ---- BENCHMARKS ----
# Primary: S&P 500
# Secondary: Russell 2500 (^R25I) — small/mid-cap growth benchmark
#            Russell 3000 Growth (^RAG) — broad growth benchmark
# yfinance ETF fallbacks if index symbols fail:
#   ^R25I → SMMD (iShares Russell 2500 ETF)
#   ^RAG  → IWZ  (iShares Russell 3000 Growth ETF)
benchmarks:
  us: "^GSPC"
  russell_2500: "^R25I"
  russell_3000_growth: "^RAG"
  russell_2500_fallback: "SMMD"
  russell_3000_growth_fallback: "IWZ"
  ng: "^NGXASI"             # NGX All-Share Index
  ng_fallback: "FM"         # Frontier Markets ETF as last resort

