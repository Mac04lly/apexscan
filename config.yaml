# ---- SCAN SETTINGS ----
scan:
  rate_limit_pause: 1.2
  history_period: "1y"
  min_history_bars: 100
  report_top_n: 20

# ---- UNIVERSE SCANNER SETTINGS ----
# Controls which stocks get scanned — replaces the manual us_themes watchlist
# Set preset to "custom" to use the us_themes list below instead
scan_universe:
  # PRESET OPTIONS:
  # "custom"      — use us_themes in this file (current behaviour, 65 tickers)
  # "sp500"       — S&P 500 only (~503 tickers)
  # "nasdaq100"   — NASDAQ 100 only (~101 tickers)
  # "sp500+ndx"   — S&P 500 + NASDAQ 100 (~550 unique)
  # "large_cap"   — S&P 500 + NASDAQ + DOW (~550 unique)
  # "mid_cap"     — S&P 400 Mid-Cap (~400 tickers)
  # "broad"       — S&P 500 + NASDAQ + S&P 400 (~900 tickers)
  # "full"        — All: SP500 + NASDAQ + SP400 + Russell2000 (~2000+ tickers)
  preset: "sp500"

  # Speed control — how many tickers to scan per session
  # 0 = no limit (scan everything in the preset)
  # Recommended: 500 for daily scans, 0 overnight
  max_tickers_per_scan: 500

  # Batch size — tickers per batch before a longer pause (prevents rate-limiting)
  batch_size: 50

  # Cache how long to store index component lists (hours)
  # 24h = refresh daily (components rarely change)
  universe_cache_hours: 24

  # Price filter — skip penny stocks and ultra-high priced stocks
  min_price: 5.0
  max_price: 99999.0

  # Volume filter override for large universe scanning
  # (config thresholds.us.min_volume still applies as final filter)

  # Sector filter — leave empty to include ALL sectors
  # Example: ["Information Technology", "Health Care", "Consumer Discretionary"]
  include_sectors: []

  # Sectors to always exclude
  exclude_sectors: []

  # Market cap tier filter — leave empty for all
  # Options: "large", "mid", "small"
  market_cap_tiers: []

  # Extra tickers to always include (appended to preset)
  extra_tickers:
    - HIMS
    - RDDT
    - CAVA
    - SOUN
    - ASTS

  # Tickers to always exclude
  exclude_tickers:
    - BRK.A    # price too high, distorts filters

# ---- ADVANCED SIGNAL THRESHOLDS ----
advanced:
  # Order Flow Persistence
  of_lookback: 10              # days to measure directional persistence
  of_min_bullish_days: 60      # % of up days to flag as persistent flow
  of_min_vol_ratio: 1.5        # up-day volume / down-day volume minimum

  # VWAP / Auction Market Theory
  vwap_lookback: 20            # days for rolling VWAP calculation
  vwap_reclaim_alert: true     # alert when price reclaims VWAP on volume

  # Market Structure
  swing_lookback: 5            # bars each side for swing pivot detection

  # Price Action Patterns
  pa_context_vol_mult: 1.2     # volume multiplier for context candle
  pa_engulf_min_body: 0.5      # minimum body size as % of prior candle
  pa_sfp_min_wick: 0.3         # minimum wick size as % of candle range

  # Alert triggers (new signal types)
  alert_persistent_flow: true
  alert_sfp_setup: true
  alert_vwap_imbalance: true
  alert_sfp_min_score: 50      # minimum apex score to fire SFP alert

# ---- EMERGING GEMS SETTINGS ----
emerging_gems:
  description: "Low-cap / emerging growth stocks with high momentum potential"
  market_cap_min: 100000000
  market_cap_max: 5000000000
  min_avg_volume: 300000
  position_size_max: 0.02
  disclaimer: "Higher risk / higher volatility — use smaller position sizes (0.5-1% max risk)"
  score_boosts:
    of_persistence_multiplier: 1.25
    pa_patterns_multiplier: 1.20
    breakout_bonus: 5
    rs_bonus_threshold: 150
    rs_bonus_points: 5
  alerts:
    gems_breakout: true
    gems_flow: true
