# ====================================================
# ApexScan Config — US + NGX Markets
# ====================================================

finnhub_key: "YOUR_FINNHUB_FREE_KEY_HERE"
alpha_vantage_key: "YOUR_ALPHA_VANTAGE_KEY_HERE"

# ---- NGX DATA PROVIDERS (two SEPARATE services — do not confuse them) ----
# NGX Pulse (ngxpulse.ng) — primary NGX source. 150+ equities in one bulk
# call, full index history back to 1996, ETFs, disclosures, dividends.
# Auth: X-API-Key header. Personal (free) tier: 100 req/day, 10/min.
ngx_pulse_key: "YOUR_NGXPULSE_API_KEY_HERE"

# NGN Market (api.ngnmarket.com) — secondary/backup NGX source.
# Auth: Bearer token. Free tier: 3,000 req/month.
ngn_market_key: "YOUR_NGM_LIVE_KEY_HERE"

# ---- ALPHA VANTAGE SETTINGS ----
alpha_vantage:
  eps_lookback_quarters: 4
  min_eps_growth: 15
  min_surprise_pct: 5
  cache_hours: 168
  rate_limit_pause: 13
  max_av_calls_per_scan: 8

# ---- THRESHOLDS ----
thresholds:
  us:
    min_3m_perf: 0          # Accept flat — score handles quality ranking
    min_volume: 100000      # Lowered from 300K — many quality stocks trade lighter
    rs_rating_min: 0        # Gate 3 in code handles RS floor; score penalises laggards
    near_52w_high: 0.80     # Within 20% of highs (was 15%)
    score_filter: 20        # Lowered from 25 — more setups, score sorts them
  ng:
    min_3m_perf: 0          # NGX: accept flat — thin data means performance lags
    min_volume: 5000        # NGX has much lower volumes than US markets
    rs_rating_min: 0        # No RS minimum for NGX (limited benchmark data)
    near_52w_high: 0.70     # NGX stocks can be further from highs
    score_filter: 10        # Very low bar — NGX scores lower due to thin data

# ---- BENCHMARKS ----
# Primary: S&P 500
# Secondary: Russell 2500 (^R25I) — small/mid-cap growth benchmark
#            Russell 3000 Growth (^RAG) — broad growth benchmark
# yfinance ETF fallbacks if index symbols fail:
#   ^R25I → SMMD (iShares Russell 2500 ETF)
#   ^RAG  → IWZ  (iShares Russell 3000 Growth ETF)
benchmarks:
  us: "^GSPC"
  russell_2500: "^R25I"
  russell_3000_growth: "^RAG"
  russell_2500_fallback: "SMMD"
  russell_3000_growth_fallback: "IWZ"
  ng: "^NGXASI"             # NGX All-Share Index
  ng_fallback: "FM"         # Frontier Markets ETF as last resort

