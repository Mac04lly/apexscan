# ---- SCAN SETTINGS ----
scan:
  rate_limit_pause: 1.2
  history_period: "1y"
  min_history_bars: 100
  report_top_n: 20

# ---- ADVANCED SIGNAL THRESHOLDS ----
advanced:
  of_lookback: 10
  of_min_bullish_days: 60
  of_min_vol_ratio: 1.5
  vwap_lookback: 20
  vwap_reclaim_alert: true
  swing_lookback: 5
  pa_context_vol_mult: 1.2
  pa_engulf_min_body: 0.5
  pa_sfp_min_wick: 0.3
  alert_persistent_flow: true
  alert_sfp_setup: true
  alert_vwap_imbalance: true
  alert_sfp_min_score: 50

# ---- EMERGING GEMS SETTINGS ----
emerging_gems:
  description: "Low-cap / emerging growth stocks with high momentum potential"
  market_cap_min: 100000000
  market_cap_max: 5000000000
  min_avg_volume: 300000
  position_size_max: 0.02
  disclaimer: "Higher risk / higher volatility — use smaller position sizes (0.5-1% max risk)"
  score_boosts:
    of_persistence_multiplier: 1.25
    pa_patterns_multiplier: 1.20
    breakout_bonus: 5
    rs_bonus_threshold: 150
    rs_bonus_points: 5
  alerts:
    gems_breakout: true
    gems_flow: true

