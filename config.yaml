# ---- SCAN SETTINGS ----
scan:
  rate_limit_pause: 1.2
  history_period: "1y"
  min_history_bars: 100
  report_top_n: 20

# ---- ADVANCED SIGNAL THRESHOLDS ----
advanced:
  # Order Flow Persistence
  of_lookback: 10              # days to measure directional persistence
  of_min_bullish_days: 60      # % of up days to flag as persistent flow
  of_min_vol_ratio: 1.5        # up-day volume / down-day volume minimum

  # VWAP / Auction Market Theory
  vwap_lookback: 20            # days for rolling VWAP calculation
  vwap_reclaim_alert: true     # alert when price reclaims VWAP on volume

  # Market Structure
  swing_lookback: 5            # bars each side for swing pivot detection

  # Price Action Patterns
  pa_context_vol_mult: 1.2     # volume multiplier for context candle
  pa_engulf_min_body: 0.5      # minimum body size as % of prior candle
  pa_sfp_min_wick: 0.3         # minimum wick size as % of candle range

  # Alert triggers (new signal types)
  alert_persistent_flow: true
  alert_sfp_setup: true
  alert_vwap_imbalance: true
  alert_sfp_min_score: 50      # minimum apex score to fire SFP alert

# ---- EMERGING GEMS SETTINGS ----
emerging_gems:
  description: "Low-cap / emerging growth stocks with high momentum potential"
  market_cap_min: 100000000
  market_cap_max: 5000000000
  min_avg_volume: 300000
  position_size_max: 0.02
  disclaimer: "Higher risk / higher volatility — use smaller position sizes (0.5-1% max risk)"
  score_boosts:
    of_persistence_multiplier: 1.25
    pa_patterns_multiplier: 1.20
    breakout_bonus: 5
    rs_bonus_threshold: 150
    rs_bonus_points: 5
  alerts:
    gems_breakout: true
    gems_flow: true

# ---- NGN MARKET API (Nigerian Exchange) ----
ngn_market_key: "YOUR_NGN_MARKET_KEY_HERE"

# ---- NGX THRESHOLDS (different from US — NGX stocks have lower volume/price) ----
thresholds:
  ngx:
    min_3m_perf: 5        # Lower than US — NGX moves slower
    min_volume: 50000     # Much lower — NGX is less liquid
    rs_rating_min: 50     # vs NGX All-Share Index
    near_52w_high: 0.85
    score_filter: 20      # Lower score filter for NGX
    min_price_ngn: 0.5    # Minimum price in Naira (filters out penny stocks)

# ---- NGX BENCHMARKS ----
benchmarks:
  ngx: "^NGSE"           # NGX All-Share Index (yfinance)
  ngx_fallback: "NGSENG.JA"

