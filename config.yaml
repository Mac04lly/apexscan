# ---- SCAN SETTINGS ----
scan:
  rate_limit_pause: 1.2
  history_period: "1y"
  min_history_bars: 100
  report_top_n: 20

# ---- ADVANCED SIGNAL THRESHOLDS ----
advanced:
  # Order Flow Persistence
  of_lookback: 10              # days to measure directional persistence
  of_min_bullish_days: 60      # % of up days to flag as persistent flow
  of_min_vol_ratio: 1.5        # up-day volume / down-day volume minimum

  # VWAP / Auction Market Theory
  vwap_lookback: 20            # days for rolling VWAP calculation
  vwap_reclaim_alert: true     # alert when price reclaims VWAP on volume

  # Market Structure
  swing_lookback: 5            # bars each side for swing pivot detection

  # Price Action Patterns
  pa_context_vol_mult: 1.2     # volume multiplier for context candle
  pa_engulf_min_body: 0.5      # minimum body size as % of prior candle
  pa_sfp_min_wick: 0.3         # minimum wick size as % of candle range

  # Alert triggers (new signal types)
  alert_persistent_flow: true
  alert_sfp_setup: true
  alert_vwap_imbalance: true
  alert_sfp_min_score: 50      # minimum apex score to fire SFP alert
